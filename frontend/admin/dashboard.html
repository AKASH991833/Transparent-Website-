<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Ansh Air Cool</title>
    <link rel="stylesheet" href="../assets/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-wind"></i>
            <h2>ANSH ADMIN</h2>
        </div>
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-link active">
                <i class="fas fa-tachometer-alt"></i> Dashboard
            </a>
            <a href="products.html" class="nav-link">
                <i class="fas fa-box"></i> Products
            </a>
            <a href="services.html" class="nav-link">
                <i class="fas fa-tools"></i> Services
            </a>
            <a href="contacts.html" class="nav-link">
                <i class="fas fa-envelope"></i> Messages
            </a>
            <a href="../index.html" class="nav-link" target="_blank">
                <i class="fas fa-external-link-alt"></i> View Website
            </a>
            <a href="#" class="nav-link logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main">
        <header class="topbar">
            <h1>Dashboard</h1>
            <div class="user-info">
                <span>Welcome, <strong id="adminName">Admin</strong></span>
            </div>
        </header>

        <div class="stats">
            <div class="stat-card blue">
                <div class="stat-icon"><i class="fas fa-box"></i></div>
                <div class="stat-info">
                    <h3 id="productCount">0</h3>
                    <p>Products</p>
                </div>
            </div>
            <div class="stat-card green">
                <div class="stat-icon"><i class="fas fa-tools"></i></div>
                <div class="stat-info">
                    <h3 id="serviceCount">0</h3>
                    <p>Services</p>
                </div>
            </div>
            <div class="stat-card yellow">
                <div class="stat-icon"><i class="fas fa-envelope"></i></div>
                <div class="stat-info">
                    <h3 id="messageCount">0</h3>
                    <p>Messages</p>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Quick Actions</h2>
            <div class="quick-actions">
                <a href="products.html" class="action-btn">
                    <i class="fas fa-plus"></i> Manage Products
                </a>
                <a href="services.html" class="action-btn secondary">
                    <i class="fas fa-edit"></i> Edit Services
                </a>
                <a href="contacts.html" class="action-btn warning">
                    <i class="fas fa-eye"></i> View Messages
                </a>
            </div>
        </div>
    </main>

    <script>
        // Check authentication
        if (!localStorage.getItem('admin_logged_in')) {
            window.location.href = 'index.html';
        }
        
        // Load dashboard data
        async function loadDashboard() {
            try {
                const res = await fetch('/api/dashboard');
                const data = await res.json();
                document.getElementById('productCount').textContent = data.products || 0;
                document.getElementById('serviceCount').textContent = data.services || 0;
                document.getElementById('messageCount').textContent = data.messages || 0;
            } catch(e) {
                // Demo mode with local data
                document.getElementById('productCount').textContent = '3';
                document.getElementById('serviceCount').textContent = '6';
                document.getElementById('messageCount').textContent = '0';
            }
        }
        loadDashboard();
        
        function logout() {
            localStorage.removeItem('admin_logged_in');
            window.location.href = 'index.html';
        }
        
        // Set background dynamically
        document.body.style.background = `
            linear-gradient(135deg, rgba(9,9,11,0.8), rgba(9,9,11,0.9)),
            url('../../images/Background.png') center/cover fixed
        `;
    </script>
</body>
</html>
